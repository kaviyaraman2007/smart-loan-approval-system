<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - BookVerse</title>
</head>
<body style="text-align: center; font-family: Arial, sans-serif; padding: 50px; background-color: #0f172a; color: white;">
    <h1 style="color: #7c3aed;">You are Offline 🌐</h1>
    <p>Please check your internet connection and try again.</p>
    <button onclick="window.location.reload()" style="background-color: #7c3aed; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px;">
      Retry Connection
    </button>
</body>
</html>
